name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PatchGuard
        run: python -m pip install -e ".[dev]"

      - name: Run backend tests
        run: python -m pytest -q

      - name: Run Ruff
        run: python -m ruff check .

      - name: Verify CLI package
        run: patchguard analyze --help

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  action-smoke:
    name: GitHub Action smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run local PatchGuard Action
        uses: ./
        with:
          pr-url: https://github.com/psf/requests/pull/7431
          output: patchguard-smoke-report.json
          format: json
          skip-llm: "true"
          annotations: "false"
          step-summary: "false"
          keep-workspace: "false"

      - name: Verify report was written
        run: test -s patchguard-smoke-report.json
